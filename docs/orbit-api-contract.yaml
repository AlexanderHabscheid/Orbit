openapi: 3.0.3
info:
  title: Orbit External API
  version: 1.2.0
servers:
  - url: http://127.0.0.1:8787
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ORBIT_API_TOKEN
  schemas:
    OrbitError:
      type: object
      required: [type, code, message]
      properties:
        type:
          type: string
          enum: [orbit_error]
        code:
          type: string
        message:
          type: string
        details: {}
    OrbitErrorEnvelope:
      type: object
      required: [id, ok, error]
      properties:
        id: { type: string }
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/OrbitError"
    OrbitSuccessEnvelope:
      type: object
      required: [id, ok, payload]
      properties:
        id: { type: string }
        ok:
          type: boolean
          enum: [true]
        payload: {}
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /readyz:
    get:
      summary: Dependency readiness check
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                required: [ok, status, dependencies]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  status:
                    type: string
                    enum: [ready]
                  dependencies:
                    type: object
                    required: [nats]
                    properties:
                      nats:
                        type: string
                        enum: [up]
        "503":
          description: Dependency unavailable
          content:
            application/json:
              schema:
                type: object
                required: [ok, status, dependencies]
                properties:
                  ok:
                    type: boolean
                    enum: [false]
                  status:
                    type: string
                    enum: [degraded]
                  dependencies:
                    type: object
                    required: [nats]
                    properties:
                      nats:
                        type: string
                        enum: [down]
  /metrics:
    get:
      summary: Prometheus metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Metrics text
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/ping:
    post:
      summary: Ping Orbit API
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/call:
    post:
      summary: Call service method
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target, body]
              additionalProperties: false
              properties:
                target:
                  type: string
                  pattern: ^[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+$
                body: {}
                timeoutMs: { type: integer, minimum: 1 }
                retries: { type: integer, minimum: 0 }
                runId: { type: string }
                packFile: { type: string }
                taskId: { type: string, minLength: 1 }
                threadId: { type: string, minLength: 1 }
                parentMessageId: { type: string, minLength: 1 }
                capabilities:
                  type: array
                  items:
                    type: string
                    minLength: 1
                traceparent: { type: string, minLength: 1 }
                dedupeKey: { type: string, minLength: 1 }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "408":
          description: Request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/publish:
    post:
      summary: Publish event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic, body]
              additionalProperties: false
              properties:
                topic:
                  type: string
                  minLength: 1
                body: {}
                runId: { type: string }
                packFile: { type: string }
                durable: { type: boolean }
                dedupeKey: { type: string, minLength: 1 }
                taskId: { type: string, minLength: 1 }
                threadId: { type: string, minLength: 1 }
                parentMessageId: { type: string, minLength: 1 }
                capabilities:
                  type: array
                  items:
                    type: string
                    minLength: 1
                traceparent: { type: string, minLength: 1 }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "408":
          description: Request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/inspect:
    post:
      summary: Inspect service
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service]
              additionalProperties: false
              properties:
                service:
                  type: string
                  minLength: 1
                timeoutMs:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "408":
          description: Request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
