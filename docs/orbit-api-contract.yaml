openapi: 3.0.3
info:
  title: Orbit External API
  version: 1.2.0
servers:
  - url: http://127.0.0.1:8787
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: ORBIT_API_TOKEN
  schemas:
    OrbitError:
      type: object
      required: [type, code, message]
      properties:
        type:
          type: string
          enum: [orbit_error]
        code:
          type: string
        message:
          type: string
        details: {}
    OrbitErrorEnvelope:
      type: object
      required: [id, ok, error]
      properties:
        id: { type: string }
        ok:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/OrbitError"
    OrbitSuccessEnvelope:
      type: object
      required: [id, ok, payload]
      properties:
        id: { type: string }
        ok:
          type: boolean
          enum: [true]
        payload: {}
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /readyz:
    get:
      summary: Dependency readiness check
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                required: [ok, status, dependencies]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  status:
                    type: string
                    enum: [ready]
                  dependencies:
                    type: object
                    required: [nats]
                    properties:
                      nats:
                        type: string
                        enum: [up]
        "503":
          description: Dependency unavailable
          content:
            application/json:
              schema:
                type: object
                required: [ok, status, dependencies]
                properties:
                  ok:
                    type: boolean
                    enum: [false]
                  status:
                    type: string
                    enum: [degraded]
                  dependencies:
                    type: object
                    required: [nats]
                    properties:
                      nats:
                        type: string
                        enum: [down]
  /metrics:
    get:
      summary: Prometheus metrics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Metrics text
          content:
            text/plain:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /.well-known/jwks.json:
    get:
      summary: Local JWKS for federation signature verification
      responses:
        "200":
          description: JWKS document
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      type: object
  /.well-known/oauth-authorization-server:
    get:
      summary: OAuth authorization server metadata
      responses:
        "200":
          description: Metadata document
          content:
            application/json:
              schema:
                type: object
  /oauth/token:
    post:
      summary: OAuth2 client credentials token endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [grant_type, client_id, client_secret]
              properties:
                grant_type: { type: string, enum: [client_credentials] }
                client_id: { type: string }
                client_secret: { type: string }
                scope: { type: string }
      responses:
        "200":
          description: Access token issued
          content:
            application/json:
              schema:
                type: object
                required: [access_token, token_type, expires_in]
                properties:
                  access_token: { type: string }
                  token_type: { type: string, enum: [Bearer] }
                  expires_in: { type: integer }
                  scope: { type: string }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/ping:
    post:
      summary: Ping Orbit API
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/call:
    post:
      summary: Call service method
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target, body]
              additionalProperties: false
              properties:
                target:
                  type: string
                  pattern: ^[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+$
                body: {}
                timeoutMs: { type: integer, minimum: 1 }
                retries: { type: integer, minimum: 0 }
                runId: { type: string }
                packFile: { type: string }
                taskId: { type: string, minLength: 1 }
                threadId: { type: string, minLength: 1 }
                parentMessageId: { type: string, minLength: 1 }
                capabilities:
                  type: array
                  items:
                    type: string
                    minLength: 1
                traceparent: { type: string, minLength: 1 }
                dedupeKey: { type: string, minLength: 1 }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "408":
          description: Request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/publish:
    post:
      summary: Publish event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [topic, body]
              additionalProperties: false
              properties:
                topic:
                  type: string
                  minLength: 1
                body: {}
                runId: { type: string }
                packFile: { type: string }
                durable: { type: boolean }
                dedupeKey: { type: string, minLength: 1 }
                taskId: { type: string, minLength: 1 }
                threadId: { type: string, minLength: 1 }
                parentMessageId: { type: string, minLength: 1 }
                capabilities:
                  type: array
                  items:
                    type: string
                    minLength: 1
                traceparent: { type: string, minLength: 1 }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "408":
          description: Request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/inspect:
    post:
      summary: Inspect service
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service]
              additionalProperties: false
              properties:
                service:
                  type: string
                  minLength: 1
                timeoutMs:
                  type: integer
                  minimum: 1
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "408":
          description: Request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/federate:
    post:
      summary: Federate message to remote domain
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, target, body]
              additionalProperties: false
              properties:
                to:
                  type: string
                  pattern: ^[^@\s]+@[^@\s]+$
                target:
                  type: string
                  pattern: ^[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+$
                body: {}
                endpoint: { type: string, minLength: 8 }
                runId: { type: string, minLength: 1 }
                timeoutMs: { type: integer, minimum: 1 }
                deliveryClass: { type: string, enum: [best_effort, durable, auditable] }
                e2eeKeyId: { type: string, minLength: 1 }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "408":
          description: Request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/federation/send:
    post:
      summary: Inbound federation delivery endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to, target, envelope]
              additionalProperties: false
              properties:
                from: { type: string, minLength: 3 }
                to: { type: string, minLength: 3 }
                target:
                  type: string
                  pattern: ^[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+$
                delivery_class: { type: string, enum: [best_effort, durable, auditable] }
                envelope: { type: object }
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "408":
          description: Request timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "429":
          description: Overloaded or rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitErrorEnvelope"
  /v1/federation/challenge:
    post:
      summary: Issue proof-of-work challenge for federation sender domain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from]
              properties:
                from: { type: string, minLength: 3 }
      responses:
        "200":
          description: Challenge issued
          content:
            application/json:
              schema:
                type: object
  /v1/bridge:
    post:
      summary: Protocol bridge normalization/dispatch (A2A, MCP)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [protocol, message]
              properties:
                protocol: { type: string, enum: [a2a, mcp] }
                message: { type: object }
                dispatch: { type: boolean }
                to: { type: string }
                target: { type: string }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
  /v1/abuse_report:
    post:
      summary: Submit federated abuse report
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reporter, subject, reason]
              properties:
                reporter: { type: string }
                subject: { type: string }
                reason: { type: string }
                severity: { type: string, enum: [low, medium, high, critical] }
                evidence: { type: object }
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrbitSuccessEnvelope"
