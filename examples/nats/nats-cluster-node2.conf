server_name: orbit-cluster-node2
port: 4222
http: 127.0.0.1:8222

jetstream {
  store_dir: "/var/lib/nats/jetstream"
}

tls {
  cert_file: "/etc/orbit/nats/tls/node2.crt"
  key_file: "/etc/orbit/nats/tls/node2.key"
  ca_file: "/etc/orbit/nats/tls/ca.crt"
  verify: true
}

cluster {
  name: "orbit-prod"
  listen: "0.0.0.0:6222"
  routes: [
    "nats://orbit-node1.internal:6222"
    "nats://orbit-node3.internal:6222"
  ]
}

accounts {
  ORBIT: {
    users: [
      { user: "orbit-app", password: "REPLACE_WITH_STRONG_SECRET" }
    ]
  }
  SYS: {
    users: [
      { user: "orbit-sys", password: "REPLACE_WITH_STRONG_SECRET" }
    ]
  }
}

system_account: SYS
