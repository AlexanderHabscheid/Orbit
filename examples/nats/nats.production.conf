server_name: orbit-prod-node
port: 4222
http: 127.0.0.1:8222

jetstream {
  store_dir: "/var/lib/nats/jetstream"
  max_mem_store: 1Gb
  max_file_store: 20Gb
}

tls {
  cert_file: "/etc/orbit/nats/tls/server.crt"
  key_file: "/etc/orbit/nats/tls/server.key"
  ca_file: "/etc/orbit/nats/tls/ca.crt"
  verify: true
}

accounts {
  ORBIT: {
    users: [
      { user: "orbit-app", password: "REPLACE_WITH_STRONG_SECRET" }
    ]
  }
  SYS: {
    users: [
      { user: "orbit-sys", password: "REPLACE_WITH_STRONG_SECRET" }
    ]
  }
}

system_account: SYS
